name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Off-chain crypto: forum_moderation ──────────────────────────────────
  # Fast, no external dependencies. Runs on every push.
  moderation-tests:
    name: forum_moderation tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p forum_moderation --release
      - run: cargo test -p forum_moderation --tests --release

  # ── 2. FFI cdylib + CMake plugin build ─────────────────────────────────────
  # Needs the logos-blockchain-circuits release tarball + Qt6.
  ffi-and-plugin-build:
    name: forum_ffi + Qt plugin
    runs-on: ubuntu-22.04
    needs: moderation-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2

      - name: Install Qt6 + cmake
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev libqt6opengl6-dev \
            libssl-dev clang libclang-dev

      - name: Cache logos-blockchain-circuits
        id: circuits-cache
        uses: actions/cache@v4
        with:
          path: ~/.logos-blockchain-circuits
          key: logos-circuits-v0.4.2-linux-x86_64

      - name: Download logos-blockchain-circuits
        if: steps.circuits-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.logos-blockchain-circuits
          curl -sSL -o /tmp/circuits.tar.gz \
            https://github.com/logos-blockchain/logos-blockchain-circuits/releases/download/v0.4.2/logos-blockchain-circuits-v0.4.2-linux-x86_64.tar.gz
          tar -xzf /tmp/circuits.tar.gz -C ~/.logos-blockchain-circuits
          mv ~/.logos-blockchain-circuits/logos-blockchain-circuits-*/* ~/.logos-blockchain-circuits/
          rmdir ~/.logos-blockchain-circuits/logos-blockchain-circuits-* || true

      - name: Build libforum_ffi.so
        # forum_ffi is its own Cargo workspace (excluded from the top-level
        # workspace because it ships as a cdylib + has its own pinned LEZ
        # deps). Build it from inside ui/ffi/.
        working-directory: ui/ffi
        run: cargo build --release

      - name: Build Qt plugin + standalone preview
        run: |
          mkdir -p ui/build
          cd ui/build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . -- -j$(nproc)
          test -f libforum_ui_plugin.so
          test -f forum_app

  # ── 3. SPEL guest build (docker buildx required) ──────────────────────────
  guest-build:
    name: SPEL guest binary (cargo risczero build)
    runs-on: ubuntu-22.04
    needs: moderation-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      - name: Install rzup + cargo-risczero
        run: |
          cargo install --locked rzup
          rzup install rust
          rzup install cpp
          rzup install cargo-risczero
      - name: Build guest binary
        run: cargo risczero build --manifest-path methods/guest/Cargo.toml
      - name: Verify ELF artifact
        run: |
          test -f methods/guest/target/riscv32im-risc0-zkvm-elf/docker/forum_registry.bin
          ls -la methods/guest/target/riscv32im-risc0-zkvm-elf/docker/

  # ── 4. End-to-end test against a local sequencer (RISC0_DEV_MODE=1) ─────
  # Only runs on tag pushes (release-time) — building LEZ from source +
  # rzup install + guest binary build is ~30 min, too heavy for per-push CI.
  # The other jobs guarantee per-push correctness.
  e2e-test:
    name: E2E against local sequencer
    runs-on: ubuntu-22.04
    needs: [ffi-and-plugin-build, guest-build]
    if: startsWith(github.ref, 'refs/tags/')
    env:
      RISC0_DEV_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      - name: Install rzup + cargo-risczero
        run: |
          cargo install --locked rzup
          rzup install rust
          rzup install cpp
          rzup install r0vm 3.0.5
          rzup install cargo-risczero
      - name: Install logos-scaffold
        run: cargo install --locked --git https://github.com/logos-co/logos-scaffold --tag v0.1.1
      - name: Bootstrap sequencer
        run: logos-scaffold setup
      - name: Start localnet (background)
        run: nohup logos-scaffold localnet start &
      - name: Wait for sequencer
        run: |
          for i in {1..60}; do
            curl -sf -X POST http://127.0.0.1:3040 -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","method":"check_health","id":1}' >/dev/null 2>&1 && exit 0 || sleep 2
          done
          echo "sequencer didn't come up in 120s" && exit 1
      - name: Run demo (skips guest build if cached)
        run: bash scripts/demo.sh
